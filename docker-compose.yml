services:
  api:
    build: .
    ports:
      - "5001:5001"
    env_file:
      - .env
    depends_on:
      - mongo
      - redis
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

volumes:
  mongo_data:
  redis_data:
